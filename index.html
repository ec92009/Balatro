<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Balatro</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game">
      <header class="masthead">
        <div>
          <p class="eyebrow">Poker roguelite prototype</p>
          <h1>Balatro</h1>
        </div>
        <span class="version">v92.2</span>
      </header>

      <section class="hud" aria-label="Run status">
        <div><span>Ante</span><strong id="ante">1</strong></div>
        <div><span>Round</span><strong id="round">1</strong></div>
        <div><span>Target</span><strong id="target">300</strong></div>
        <div><span>Score</span><strong id="score">0</strong></div>
        <div><span>Hands</span><strong id="hands">4</strong></div>
        <div><span>Discards</span><strong id="discards">3</strong></div>
        <div><span>Cash</span><strong id="cash">$4</strong></div>
      </section>

      <section class="table" aria-label="Card table">
        <div class="result" id="result">Select up to five cards, then play or discard.</div>
        <div class="hand" id="hand" aria-label="Cards in hand"></div>
        <div class="controls">
          <button id="play" type="button">▶ Play</button>
          <button id="discard" type="button">↻ Discard</button>
          <button id="new-run" type="button">⟲ New Run</button>
        </div>
      </section>

      <aside class="side-panel" aria-label="Jokers and shop">
        <section>
          <h2>Jokers</h2>
          <div class="jokers" id="jokers"></div>
        </section>
        <section class="shop" id="shop-panel" hidden>
          <div class="shop-head">
            <h2>Shop</h2>
            <button id="next-round" type="button">→ Next Round</button>
          </div>
          <div class="shop-grid" id="shop"></div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
